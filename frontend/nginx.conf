server {
    # 8080, not 80 - binding a port below 1024 requires root/
    # CAP_NET_BIND_SERVICE, which the container deliberately doesn't have
    # (runs as the unprivileged nginx user - see Dockerfile).
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed filenames (Vite content-hashes every build output) are safe to
    # cache forever - a new build always gets a new filename.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # index.html is the one unhashed entry point - it must never be served
    # from cache, or browsers can pin a stale build indefinitely (it just
    # references old /assets/* hashes forever). no-store (not no-cache) is
    # deliberate: no-cache still permits storing + revalidating, which some
    # browsers apply inconsistently on plain navigation vs. reload.
    location / {
        add_header Cache-Control "no-store" always;
        try_files $uri $uri/ /index.html;
    }
}
