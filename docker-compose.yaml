name: ground-trip

services:
  db:
    image: pgvector/pgvector:0.8.2-pg17
    restart: unless-stopped
    env_file:
      - ./backend/.env
    # Bound to loopback only, not published on all interfaces - a plain
    # "5432:5432" mapping is reachable from any network interface on the
    # host, which on a public-facing machine means anyone on the internet
    # could connect using these well-known default credentials
    # (POSTGRES_USER/PASSWORD=postgres). 127.0.0.1-only keeps this exact
    # same workflow working (uv run uvicorn --reload, pytest, psql, a local
    # DB client all connect to localhost:5432 same as before) while closing
    # off every other network path to it.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/ground_trip
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:8080"

volumes:
  postgres_data:
    # Pinned to the pre-existing volume from the smart_travel_planner ->
    # ground-trip project rename (2026-07-11) so the real data isn't
    # orphaned under a new project-prefixed volume name. The database
    # inside it was already renamed in place (ALTER DATABASE ... RENAME).
    # external: true silences Compose's project-ownership-mismatch warning -
    # this volume was created under the old project name, not this one, on
    # purpose.
    name: smart_travel_planner_postgres_data
    external: true
